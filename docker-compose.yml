services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - UVICORN_RELOAD=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - DATABASE_URL=postgresql://responseiq:responseiq@db:5432/responseiq
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      - db
      - jaeger
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: responseiq
      POSTGRES_PASSWORD: responseiq
      POSTGRES_DB: responseiq
    ports:
      - "5435:5432"
  jaeger:
    image: jaegertracing/all-in-one:1.53
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4317:4317"
