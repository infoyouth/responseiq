# cliff.toml — git-cliff changelog configuration
# Docs: https://git-cliff.org/docs/configuration
# Strategy: git-cliff owns CHANGELOG.md exclusively.
# python-semantic-release handles version bumping, tagging, and PyPI publish.

[changelog]
# Jinja2 template rendered once per release run.
header = """
# Changelog\n
All notable changes to **ResponseIQ** are documented here.\n
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/)
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits | filter(attribute="scope") | sort(attribute="scope") %}
- **{{ commit.scope | upper_first }}**: {{ commit.message | upper_first }}\
  {% if commit.breaking %} ⚠️ **BREAKING**{% endif %} \
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ remote.url }}/commit/{{ commit.id }}))\
{% endfor %}\
{% for commit in commits %}
{% if not commit.scope %}\
- {{ commit.message | upper_first }}\
  {% if commit.breaking %} ⚠️ **BREAKING**{% endif %} \
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ remote.url }}/commit/{{ commit.id }}))\
{% endif %}
{% endfor %}
{% endfor %}\n
"""

# Appended at the end of the file on each run
footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""

trim = true

[git]
# Only include commits that match conventional commit format.
conventional_commits = true
filter_unconventional = true
split_commits = false

# Regex to parse the commit message.
commit_parsers = [
  { message = "^feat(\\(.+\\))?!|^fix(\\(.+\\))?!|BREAKING CHANGE", group = "⚠️ Breaking Changes" },
  { message = "^feat",    group = "✨ Features" },
  { message = "^fix",     group = "🐛 Bug Fixes" },
  { message = "^perf",    group = "⚡ Performance" },
  { message = "^refactor",group = "♻️ Refactoring" },
  { message = "^docs",    group = "📚 Documentation" },
  { message = "^test",    group = "🧪 Tests" },
  { message = "^ci",      group = "⚙️ CI/CD" },
  { message = "^build",   group = "🏗️ Build System" },
  { message = "^chore\\(release\\)", skip = true },  # Skip PSR release commits
  { message = "^chore",   group = "🔧 Chores" },
  { message = "^style",   skip = true },
  { body = ".*security", group = "🔒 Security" },
]

# Commits without a conventional prefix are excluded from changelog.
filter_commits = true

# Regex list for tags to include. Matches v1.2.3 and v1.2.3-rc.1
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+(-(rc|alpha|beta)\\.[0-9]+)?"

# Do NOT include commits before this tag (first ever release).
# Useful for projects migrating to git-cliff mid-life.
# topo_order = false means tags are sorted by date.
topo_order = false
sort_commits = "newest"

[remote.github]
owner = "infoyouth"
repo  = "responseiq"
