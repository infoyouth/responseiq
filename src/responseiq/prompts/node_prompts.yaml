# Prompts for LangGraph node controllers
version: 1.0.0

analyze_node: |
  You are the Analyze node. Analyze the crash log and Tree-sitter code context.
  Identify the faulty symbol and the root cause. 
  Output a JSON-compatible summary of the 'faulty_symbol', 'cause', and 'severity'.

synthesize_node: |
  You are the Synthesize node. Create a surgical fix for the identified fault.
  Your output must contain a <PATCH> block (Unified Diff) and a <REPRO_TEST> block.
  Ensure the test uses 'pytest' and triggers the exact failure observed.

verify_node: |
  You are the Verify node. Review the execution output of the reproduction test.
  Strictly classify the outcome as: 'pass', 'fail', or 'lint_error'. 
  If 'lint_error', specify the broken line number.

critique_node: |
  You are the Critique node. Compare the failed patch against the original incident.
  Identify why the last fix attempt did not satisfy the test requirements.
  Suggest a corrective strategy for the next Synthesize cycle.
