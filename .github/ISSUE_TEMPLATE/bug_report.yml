name: 🐛 Bug Report
description: Something is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please be as detailed as possible — it helps us fix things faster.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what actually happened?
      placeholder: "Example: `responseiq --mode fix` crashes with a KeyError instead of showing a fix report."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `responseiq --mode scan --target ./logs/app.log`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output / stack trace
      description: Paste any error output here. This will be formatted automatically.
      render: shell

  - type: input
    id: version
    attributes:
      label: ResponseIQ version
      placeholder: "e.g. 2.19.2  (run `responseiq --version`)"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - pip install responseiq
        - uv pip install responseiq
        - Docker
        - From source (git clone)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Windows (native)
    validations:
      required: true

  - type: dropdown
    id: llm-backend
    attributes:
      label: LLM backend in use
      options:
        - Ollama (local)
        - OpenAI
        - No LLM (rule-engine fallback)
        - Other
