name: Test & Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run pytest
      - name: Lint
        run: uv run flake8 src tests
      - name: Type check
        run: uv run mypy src
      - name: Security scan
        run: uv run bandit -r src
