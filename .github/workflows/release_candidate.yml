name: Release Candidate Verify

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rc-verify:
    name: 🔬 RC Verify (Py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a  # v7

      - name: 🏗️ Build distributables
        run: |
          rm -rf dist
          uv build

      - name: 📦 Install wheel in fresh venv
        run: |
          uv venv /tmp/responseiq-rc
          WHEEL_PATH=$(ls -t dist/*.whl | head -n 1)
          uv pip install --python /tmp/responseiq-rc/bin/python "$WHEEL_PATH"

      - name: 💨 CLI smoke tests
        run: |
          /tmp/responseiq-rc/bin/responseiq --help
          /tmp/responseiq-rc/bin/python -m responseiq.cli --help

      - name: 🏥 API health smoke test
        run: |
          /tmp/responseiq-rc/bin/python -m uvicorn responseiq.app:app --host 127.0.0.1 --port 8001 &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          sleep 5
          curl -fsS http://127.0.0.1:8001/health
