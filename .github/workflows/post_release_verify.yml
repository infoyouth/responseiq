name: Post-Release Verify

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      source:
        description: "Verification source: local (build from checkout) or pypi (install released package)"
        required: false
        default: "local"
      version:
        description: "Release version to verify (e.g. 1.3.8 or v1.3.8)"
        required: true

permissions:
  contents: read
  issues: write

jobs:
  verify:
    name: Verify from PyPI (Py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            api-port: 8011
          - python-version: "3.12"
            api-port: 8012

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 🔍 Resolve verification mode and version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            SOURCE="pypi"
            RAW_VERSION="${{ github.event.release.tag_name }}"
          else
            SOURCE="${{ github.event.inputs.source || 'local' }}"
            RAW_VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${RAW_VERSION#v}"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Verification source: $SOURCE"
          echo "Verifying responseiq==$VERSION"

      - name: 🏗️ Build local package
        if: steps.version.outputs.source == 'local'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          rm -rf dist
          uv build

      - name: 📦 Install local wheel
        if: steps.version.outputs.source == 'local'
        shell: bash
        run: |
          python -m venv /tmp/responseiq-post
          /tmp/responseiq-post/bin/pip install --upgrade pip
          WHEEL_PATH=$(ls -t dist/*.whl | head -n 1)
          /tmp/responseiq-post/bin/pip install "$WHEEL_PATH"

      - name: ⬇️ Install from PyPI (with retry)
        if: steps.version.outputs.source == 'pypi'
        shell: bash
        run: |
          python -m venv /tmp/responseiq-post
          /tmp/responseiq-post/bin/pip install --upgrade pip
          VERSION="${{ steps.version.outputs.version }}"

          for attempt in {1..8}; do
            echo "Install attempt $attempt for responseiq==$VERSION"
            if /tmp/responseiq-post/bin/pip install --no-cache-dir "responseiq==$VERSION"; then
              echo "Install succeeded"
              exit 0
            fi
            if [[ "$attempt" -eq 8 ]]; then
              echo "Install failed after retries"
              exit 1
            fi
            sleep 20
          done

      - name: 💨 CLI smoke tests
        run: |
          /tmp/responseiq-post/bin/responseiq --help
          /tmp/responseiq-post/bin/python -m responseiq.cli --help

      - name: 🏥 API health smoke test
        shell: bash
        run: |
          /tmp/responseiq-post/bin/python -m uvicorn responseiq.app:app --host 127.0.0.1 --port ${{ matrix.api-port }} &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          sleep 5
          curl -fsS http://127.0.0.1:${{ matrix.api-port }}/health

  notify-failure:
    name: Open issue on failure
    needs: verify
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: 🚨 Open failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const releaseTag = context.eventName === 'release'
              ? context.payload.release?.tag_name
              : context.payload.inputs?.version;

            const title = `Post-release verification failed (${releaseTag ?? 'unknown-version'})`;
            const body = [
              'Automated post-release verification failed.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
              `- Version input/tag: ${releaseTag ?? 'N/A'}`,
              '',
              'Please inspect the failing verification job and remediate before further rollout.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
