name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "action.yml"
      - "uv.lock"
      - "Makefile"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docs/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Set to true to run integration tests'
        required: false
        default: 'false'

permissions: read-all

env:
  PYTHON_VERSION: '3.12'
  CACHE_NAME: responseiq-uv

jobs:
  check-changes:
    name: 🔍 Check for changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.python-changes.outputs.any_changed }}
      integration: ${{ steps.integration-changes.outputs.any_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: 🔍 Detect python-related changes
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323  # v47.0.5
        id: python-changes
        with:
          files: |
            src/**
            tests/**
            pyproject.toml
            uv.lock
            .github/workflows/**
            action.yml
            Makefile
      - name: 🔍 Detect integration-related changes
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323  # v47.0.5
        id: integration-changes
        with:
          files: |
            src/**
            tests/**
            pyproject.toml
            uv.lock
            docker-compose.yml
            Dockerfile

  quality-checks:
    name: Code Quality & Tests (3.12)
    needs: check-changes
    runs-on: ubuntu-latest
    if: needs.check-changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: 🐍 Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: ⚡ Install UV
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a  # v7
        with:
          enable-cache: true
      - name: 📦 Sync dependencies
        run: uv sync --group dev --active

      - name: 📁 Create reports directory
        run: mkdir -p reports

      # Fast Checks — all via ruff (matches Makefile exactly, zero drift)
      - name: 🎨 Format check (ruff)
        run: uv run ruff format --check src tests 2>&1 | tee reports/ruff-format.txt

      - name: 🔍 Lint (ruff)
        run: uv run ruff check src tests 2>&1 | tee reports/ruff-lint.txt

      - name: 🔬 Type check (mypy)
        run: uv run mypy src --txt-report reports/mypy-report 2>&1 | tee reports/mypy.txt

      # Security Checks
      - name: 🔒 Security scan (ruff --select S)
        run: uv run ruff check --select S src 2>&1 | tee reports/security.txt

      - name: 🛡️ Dependency audit (pip-audit)
        run: uv run pip-audit --format cyclonedx-json -o reports/pip-audit.json 2>&1 | tee reports/pip-audit.txt || true

      # Tests — generate JUnit XML + coverage reports
      - name: 🧪 Run tests (pytest + coverage)
        run: |
          uv run pytest \
            -n auto \
            --dist=loadscope \
            --junitxml=reports/pytest.xml \
            --cov=src/responseiq \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --cov-report=term-missing \
            --disable-warnings \
            -q 2>&1 | tee reports/pytest.txt

      - name: 📊 Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: reports/coverage.xml
          fail_ci_if_error: false

      # Packaging smoke test
      - name: 🏗️ Build distributables
        run: |
          rm -rf dist
          uv build

      - name: 💨 Smoke test wheel install and CLI
        run: |
          uv venv /tmp/responseiq-smoke
          WHEEL_PATH=$(ls -t dist/*.whl | head -n 1)
          uv pip install --python /tmp/responseiq-smoke/bin/python "$WHEEL_PATH" -q
          /tmp/responseiq-smoke/bin/responseiq --help
          /tmp/responseiq-smoke/bin/python -m responseiq.cli --help

      # Rich GitHub Step Summary
      - name: 📝 Write job summary
        if: always()
        run: |
          echo "## 🛡️ ResponseIQ CI — Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          check_status() {
            local label="$1"; local file="$2"; local pass_pattern="$3"
            if [ ! -f "$file" ]; then
              echo "| $label | ⚪ no output |" >> $GITHUB_STEP_SUMMARY
            elif grep -qE "$pass_pattern" "$file" 2>/dev/null; then
              echo "| $label | ✅ passed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $label | ❌ failed |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          check_status "🎨 ruff format"   "reports/ruff-format.txt" "All checks passed|unchanged"
          check_status "🔍 ruff lint"     "reports/ruff-lint.txt"   "All checks passed"
          check_status "🔒 security scan" "reports/security.txt"    "All checks passed"
          check_status "🔐 pip-audit"     "reports/pip-audit.txt"   "No known vulnerabilities"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/pytest.txt ]; then
            SUMMARY=$(grep -E "passed|failed|error|skipped" reports/pytest.txt | tail -1)
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/pytest.txt ]; then
            COVERAGE=$(grep -E "^TOTAL" reports/pytest.txt | awk '{print $NF}')
            if [ -n "$COVERAGE" ]; then
              echo "**Total coverage: $COVERAGE**" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔎 mypy" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/mypy.txt ]; then
            MYPY_SUMMARY=$(grep -E "^(Success|Found [0-9]+ error)" reports/mypy.txt | tail -1)
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "${MYPY_SUMMARY:-see mypy.txt artifact}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Artifacts: \`reports/\` (JUnit XML · Coverage HTML · tool logs)_" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ci-reports
          path: reports/
          retention-days: 14

      - name: 🌐 Upload coverage HTML (browsable)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-html
          path: reports/coverage-html/
          retention-days: 14


  # Merged into quality-checks
  # security-scan: ... REMOVED ...

  # Merged into quality-checks (pre-commit is largely redundant with explicit checks above)
  # pre-commit-on-pr: ... REMOVED ...


  license-check:
    name: 📜 License and policy checks
    runs-on: ubuntu-latest
    needs: check-changes
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: 📜 License scan (placeholder)
        run: |
          echo "License/policy scan step is a placeholder."
          echo "Replace with a proper license scanner action and configure required inputs."

  # REMOVED DUPLICATE check-changes job here #

  ci-success:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - check-changes
      - quality-checks
      - check-docker-build
      - license-check
    if: always()
    steps:
      - name: 🚦 Evaluate gate
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more required jobs failed or were cancelled."
          echo "quality-checks:    ${{ needs.quality-checks.result }}"
          echo "check-docker-build: ${{ needs.check-docker-build.result }}"
          echo "license-check:     ${{ needs.license-check.result }}"
          exit 1
      - name: ✅ All checks passed
        run: echo "All required checks passed or were skipped."

  check-docker-build:
    name: 🐳 Verify Docker build
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.integration == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - name: 🔨 Build image (no push)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          push: false
          tags: responseiq:test

  integration-tests:
    name: 🔗 Integration tests
    needs: check-changes
    runs-on: ubuntu-latest
    if: |
      needs.check-changes.outputs.integration == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: 🐳 Verify Docker runtime
        run: docker --version
      - name: ⚡ Install UV
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a  # v7
        with:
          enable-cache: true
      - name: 📦 Sync dependencies
        run: uv sync --group dev --active
      - name: 🔗 Run integration tests
        env:
          RUN_INTEGRATION: '1'
        run: |
          uv run pytest tests/integration/test_integration_postgres.py -q
