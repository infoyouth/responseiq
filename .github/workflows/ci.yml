name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "action.yml"
      - "uv.lock"
      - "Makefile"
      - "Dockerfile"
      - "docker-compose.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "action.yml"
      - "uv.lock"
      - "Makefile"
      - "Dockerfile"
      - "docker-compose.yml"
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Set to true to run integration tests'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.12'
  CACHE_NAME: responseiq-uv

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
              - 'action.yml'
              - 'Makefile'
            integration:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'docker-compose.yml'
              - 'Dockerfile'

  setup-and-cache:
    name: Prepare environment
    needs: check-changes
    if: needs.check-changes.outputs.python == 'true' || needs.check-changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache UV and pip cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        run: uv sync --group dev --active
      - name: Install pre-commit hooks
        run: |
          pip install pre-commit
          # Run pre-commit hooks, but don't fail properly yet if env is weird - just ensure it installs
          # Actually, running pre-commit check here is redundant if we run specific checks below.
          # Let's keep it minimal.
          echo "Pre-commit installed."

  quality-checks:
    name: Code Quality & Tests
    needs: [setup-and-cache, check-changes]
    runs-on: ubuntu-latest
    if: needs.check-changes.outputs.python == 'true'
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        run: uv sync --group dev --active
      
      # Fast Checks
      - name: Lint (flake8)
        run: uv run flake8 src tests
      - name: Format check (black/isort)
        run: uv run black --check src tests && uv run isort --check-only src tests
      - name: Type check (mypy)
        run: uv run mypy src
      
      # Security Checks (Merged to save VM time)
      - name: Bandit security scan
        run: uv run bandit -r src -ll
      - name: Dependency vulnerability scan (safety)
        run: uv run safety check --full-report
      
      # Tests
      - name: Run tests (pytest + coverage)
        run: |
          uv run pytest --maxfail=1 --disable-warnings -q

      # Packaging smoke test: ensure installable artifact and CLI entrypoint work
      - name: Build distributables
        run: |
          rm -rf dist
          uv build
      - name: Smoke test wheel install and CLI
        run: |
          python -m venv /tmp/responseiq-smoke
          /tmp/responseiq-smoke/bin/pip install --upgrade pip
          WHEEL_PATH=$(ls -t dist/*.whl | head -n 1)
          /tmp/responseiq-smoke/bin/pip install "$WHEEL_PATH"
          /tmp/responseiq-smoke/bin/responseiq --help
          /tmp/responseiq-smoke/bin/python -m responseiq.cli --help

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache || ./


  # Merged into quality-checks
  # security-scan: ... REMOVED ...

  # Merged into quality-checks (pre-commit is largely redundant with explicit checks above)
  # pre-commit-on-pr: ... REMOVED ...


  license-check:
    name: License and policy checks
    runs-on: ubuntu-latest
    needs: check-changes
    steps:
      - uses: actions/checkout@v4
      - name: License scan (placeholder)
        run: |
          echo "License/policy scan step is a placeholder."
          echo "Replace with a proper license scanner action and configure required inputs."

  # REMOVED DUPLICATE check-changes job here #

  check-docker-build:
    name: Verify Docker build
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.integration == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: responseiq:test

  report:
    name: Upload reports
    runs-on: ubuntu-latest
    needs: [quality-checks]
    steps:
      - name: Aggregate and upload logs
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            .pytest_cache
            /tmp/bandit-output || ./

  integration-tests:
    name: Integration tests
    needs: [setup-and-cache, check-changes]
    runs-on: ubuntu-latest
    if: |
      needs.check-changes.outputs.integration == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker (already available on runners)
        run: docker --version
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        run: uv sync --group dev --active
      - name: Run integration tests
        env:
          RUN_INTEGRATION: '1'
        run: |
          uv run pytest tests/integration/test_integration_postgres.py -q
