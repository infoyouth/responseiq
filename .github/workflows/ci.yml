name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "action.yml"
      - "uv.lock"
      - "Makefile"
      - "Dockerfile"
      - "docker-compose.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "action.yml"
      - "uv.lock"
      - "Makefile"
      - "Dockerfile"
      - "docker-compose.yml"
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Set to true to run integration tests'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.12'
  CACHE_NAME: responseiq-uv

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
              - 'action.yml'
              - 'Makefile'
            integration:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'docker-compose.yml'
              - 'Dockerfile'

  setup-and-cache:
    name: Prepare environment
    needs: check-changes
    if: needs.check-changes.outputs.python == 'true' || needs.check-changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache UV and pip cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        run: uv sync --group dev --active
      - name: Install pre-commit hooks
        run: |
          pip install pre-commit
          # Run pre-commit hooks, but don't fail properly yet if env is weird - just ensure it installs
          # Actually, running pre-commit check here is redundant if we run specific checks below.
          # Let's keep it minimal.
          echo "Pre-commit installed."

  quality-checks:
    name: Code Quality & Tests
    needs: [setup-and-cache, check-changes]
    runs-on: ubuntu-latest
    if: needs.check-changes.outputs.python == 'true'
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        run: uv sync --group dev --active

      - name: Create reports directory
        run: mkdir -p reports

      # Fast Checks — all via ruff (matches Makefile exactly, zero drift)
      - name: Format check (ruff)
        run: uv run ruff format --check src tests 2>&1 | tee reports/ruff-format.txt

      - name: Lint (ruff)
        run: uv run ruff check src tests 2>&1 | tee reports/ruff-lint.txt

      - name: Type check (mypy)
        run: uv run mypy src --txt-report reports/mypy-report 2>&1 | tee reports/mypy.txt

      # Security Checks
      - name: Security scan (ruff --select S)
        run: uv run ruff check --select S src 2>&1 | tee reports/security.txt

      - name: Dependency vulnerability scan (safety)
        run: uv run safety check --full-report 2>&1 | tee reports/safety.txt || true

      # Tests — generate JUnit XML + coverage reports
      - name: Run tests (pytest + coverage)
        run: |
          uv run pytest \
            --junitxml=reports/pytest.xml \
            --cov=src/responseiq \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --cov-report=term-missing \
            --disable-warnings \
            -q 2>&1 | tee reports/pytest.txt

      # Packaging smoke test
      - name: Build distributables
        run: |
          rm -rf dist
          uv build

      - name: Smoke test wheel install and CLI
        run: |
          python -m venv /tmp/responseiq-smoke
          /tmp/responseiq-smoke/bin/pip install --upgrade pip -q
          WHEEL_PATH=$(ls -t dist/*.whl | head -n 1)
          /tmp/responseiq-smoke/bin/pip install "$WHEEL_PATH" -q
          /tmp/responseiq-smoke/bin/responseiq --help
          /tmp/responseiq-smoke/bin/python -m responseiq.cli --help

      # Rich GitHub Step Summary
      - name: Write job summary
        if: always()
        run: |
          echo "## 🛡️ ResponseIQ CI — Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          check_status() {
            local label="$1"; local file="$2"; local pass_pattern="$3"
            if [ ! -f "$file" ]; then
              echo "| $label | ⚪ no output |" >> $GITHUB_STEP_SUMMARY
            elif grep -qE "$pass_pattern" "$file" 2>/dev/null; then
              echo "| $label | ✅ passed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $label | ❌ failed |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          check_status "🎨 ruff format"   "reports/ruff-format.txt" "All checks passed|unchanged"
          check_status "🔍 ruff lint"     "reports/ruff-lint.txt"   "All checks passed"
          check_status "🔒 security scan" "reports/security.txt"    "All checks passed"
          check_status "🔐 safety"        "reports/safety.txt"      "No known security vulnerabilities"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/pytest.txt ]; then
            SUMMARY=$(grep -E "passed|failed|error|skipped" reports/pytest.txt | tail -1)
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/pytest.txt ]; then
            COVERAGE=$(grep -E "^TOTAL" reports/pytest.txt | awk '{print $NF}')
            if [ -n "$COVERAGE" ]; then
              echo "**Total coverage: $COVERAGE**" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔎 mypy" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/mypy.txt ]; then
            MYPY_SUMMARY=$(grep -E "^(Success|Found [0-9]+ error)" reports/mypy.txt | tail -1)
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "${MYPY_SUMMARY:-see mypy.txt artifact}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Artifacts: \`reports/\` (JUnit XML · Coverage HTML · tool logs)_" >> $GITHUB_STEP_SUMMARY

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-py${{ matrix.python-version }}
          path: reports/
          retention-days: 14

      - name: Upload coverage HTML (browsable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: reports/coverage-html/
          retention-days: 14


  # Merged into quality-checks
  # security-scan: ... REMOVED ...

  # Merged into quality-checks (pre-commit is largely redundant with explicit checks above)
  # pre-commit-on-pr: ... REMOVED ...


  license-check:
    name: License and policy checks
    runs-on: ubuntu-latest
    needs: check-changes
    steps:
      - uses: actions/checkout@v4
      - name: License scan (placeholder)
        run: |
          echo "License/policy scan step is a placeholder."
          echo "Replace with a proper license scanner action and configure required inputs."

  # REMOVED DUPLICATE check-changes job here #

  check-docker-build:
    name: Verify Docker build
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.integration == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: responseiq:test

  integration-tests:
    name: Integration tests
    needs: [setup-and-cache, check-changes]
    runs-on: ubuntu-latest
    if: |
      needs.check-changes.outputs.integration == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker (already available on runners)
        run: docker --version
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        run: uv sync --group dev --active
      - name: Run integration tests
        env:
          RUN_INTEGRATION: '1'
        run: |
          uv run pytest tests/integration/test_integration_postgres.py -q
