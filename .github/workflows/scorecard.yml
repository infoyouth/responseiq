name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    # Weekly scan on Saturday at 01:30 UTC
    - cron: "30 1 * * 6"
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    name: 🛡️ Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write # required for OIDC token → publish_results

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: 🔍 Run Scorecard analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46  # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes results to https://api.scorecard.dev — powers the README badge
          publish_results: true

      - name: 📤 Upload SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: 🛡️ Upload to code scanning
        uses: github/codeql-action/upload-sarif@820e3160e279568db735cee8ed8f8e77a6da7818  # v3
        with:
          sarif_file: results.sarif
