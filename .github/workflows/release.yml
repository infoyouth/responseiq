name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write        # required for OIDC Trusted Publishing to PyPI
  attestations: write   # required for actions/attest-build-provenance (SLSA)

jobs:
  pre-release-verify:
    name: Pre-release verification
    uses: ./.github/workflows/release_candidate.yml

  release:
    name: Semantic Release
    needs: pre-release-verify
    runs-on: ubuntu-latest
    environment: production   # requires approval in GitHub repo Settings → Environments → production
    concurrency: release
    outputs:
      new_release_published: ${{ steps.semantic.outputs.released }}
      new_release_version: ${{ steps.semantic.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: true

      - name: 🏷️ Python Semantic Release
        id: semantic
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.RELEASE_PAT }}
          git_committer_name: "Youth Innovations"
          git_committer_email: "info.youthinno@gmail.com"
          changelog: false  # git-cliff owns CHANGELOG.md

      # ---------------------------------------------------------------------------
      # git-cliff: generate a rich, human-readable CHANGELOG.md after PSR tags
      # ---------------------------------------------------------------------------
      - name: 📝 Generate CHANGELOG (git-cliff)
        if: steps.semantic.outputs.released == 'true'
        continue-on-error: true  # git-cliff exits 1 on unparseable commits; file is still written
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --latest
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: 💾 Commit CHANGELOG
        if: steps.semantic.outputs.released == 'true'
        run: |
          git config user.name "Youth Innovations"
          git config user.email "info.youthinno@gmail.com"
          # PSR v10 commits+pushes in-process inside this same runner, so local HEAD == remote HEAD.
          # git pull --rebase is NOT used here — git-cliff writes CHANGELOG.md as an unstaged
          # file, which causes rebase to immediately abort with "unstaged changes".
          # Simply stage, commit, and push directly.
          git add CHANGELOG.md
          git diff --cached --quiet && echo "CHANGELOG unchanged" || \
            git commit -m "docs: update CHANGELOG for v${{ steps.semantic.outputs.version }} [skip ci]"
          git push

      - name: 🚀 Publish to PyPI
        if: steps.semantic.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          # No PYPI_TOKEN needed — uses OIDC Trusted Publishing.
          # One-time setup at: https://pypi.org/manage/project/responseiq/settings/publishing/

      - name: 🔐 Attest build provenance (SLSA)
        if: steps.semantic.outputs.released == 'true'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/*

  docker-publish:
    name: Build & Push Docker
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    environment: production   # explicit gate — covered transitively by release, but explicit for auditability
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - name: 📦 Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
