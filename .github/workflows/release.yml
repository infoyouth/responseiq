name: Release & Publish

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: 
      - completed
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  pre-release-verify:
    name: Pre-release verification
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/release_candidate.yml

  release:
    name: Semantic Release
    needs: pre-release-verify
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    concurrency: release
    outputs:
      new_release_published: ${{ steps.semantic.outputs.released }}
      new_release_version: ${{ steps.semantic.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Semantic Release
        id: semantic
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "Youth Innovations"
          git_committer_email: "info.youthinno@gmail.com"
          changelog: false  # git-cliff owns CHANGELOG.md

      # ---------------------------------------------------------------------------
      # git-cliff: generate a rich, human-readable CHANGELOG.md after PSR tags
      # ---------------------------------------------------------------------------
      - name: Generate CHANGELOG with git-cliff
        if: steps.semantic.outputs.released == 'true'
        continue-on-error: true  # git-cliff exits 1 on unparseable commits; file is still written
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --latest
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit updated CHANGELOG
        if: steps.semantic.outputs.released == 'true'
        run: |
          git config user.name "Youth Innovations"
          git config user.email "info.youthinno@gmail.com"
          # PSR pushed its own release commit before this step; rebase to avoid diverged push
          git pull --rebase
          git add CHANGELOG.md
          git diff --cached --quiet && echo "CHANGELOG unchanged" || \
            git commit -m "docs: update CHANGELOG for v${{ steps.semantic.outputs.version }} [skip ci]"
          git push

      - name: Publish to PyPI
        if: steps.semantic.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

  docker-publish:
    name: Build & Push Docker
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
