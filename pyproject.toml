[project]
name = "responseiq"
version = "1.2.0"
description = "AI-powered remediation copilot for incident response"
authors = [{ name = "Youth Innovations", email = "info.youthinno@gmail.com" }]
requires-python = "==3.12.*"

dependencies = [
    "fastapi",
    "uvicorn",
    "loguru",
    "pydantic",
    "httpx",
    "slack-sdk",
    "PyGithub",
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-instrumentation",
    "opentelemetry-instrumentation-fastapi",
    "opentelemetry-exporter-jaeger",
    "opentelemetry-instrumentation-logging",
    "psycopg2-binary",
    "sqlmodel",
    "pydantic-settings>=2.12.0",
    "opentelemetry-exporter-otlp>=1.15.0",
    "ruamel-yaml>=0.19.1",
]

[dependency-groups]
dev = [
    "pytest",
    "black",
    "ruff",
    "flake8",
    "isort",
    "bandit",
    "mypy",
    "types-requests",
    "pbr",
    "pre-commit",
    "safety",
]

[tool.black]
line-length = 88

[tool.isort]
profile = "black"

[tool.flake8]
max-line-length = 88

[tool.ruff]
line-length = 88

[tool.bandit]
exclude_dirs = ["tests", "fixtures"]

[tool.semantic_release]
version_variable = [
    "src/__version__.py:__version__",
]
version_toml = [
    "pyproject.toml:project.version",
]
branch = "main"
upload_to_pypi = false
upload_to_release = true
build_command = "pip install uv && uv build"
commit_message = "chore(release): {version} [skip ci]"


