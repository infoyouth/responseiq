[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "responseiq"
version = "1.2.1"
description = "AI-Powered Infrastructure Copilot: The Self-Healing SRE."
readme = "README.md"
authors = [{ name = "Youth Innovations", email = "info.youthinno@gmail.com" }]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Topic :: System :: Systems Administration",
    "Topic :: Software Development :: Debuggers",
    "Framework :: FastAPI",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
home-page = "https://github.com/infoyouth/responseiq"
repository = "https://github.com/infoyouth/responseiq"
documentation = "https://github.com/infoyouth/responseiq#readme"

dependencies = [
    "fastapi",
    "uvicorn",
    "loguru",
    "pydantic",
    "httpx",
    "slack-sdk",
    "PyGithub",
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-instrumentation",
    "opentelemetry-instrumentation-fastapi",
    "opentelemetry-exporter-jaeger",
    "opentelemetry-instrumentation-logging",
    "psycopg2-binary",
    "sqlmodel",
    "pydantic-settings>=2.12.0",
    "opentelemetry-exporter-otlp>=1.15.0",
    "ruamel-yaml>=0.19.1",
    "aiofiles",
]

[project.scripts]
responseiq = "src.cli:main"

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "black",
    "ruff",
    "flake8",
    "isort",
    "bandit",
    "mypy",
    "types-requests",
    "types-aiofiles",
    "pbr",
    "pre-commit",
    "safety",
    "pytest-cov>=7.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.black]
line-length = 120

[tool.isort]
profile = "black"

[tool.flake8]
max-line-length = 120

[tool.ruff]
line-length = 120

[tool.bandit]
exclude_dirs = ["tests", "fixtures"]

[tool.semantic_release]
version_variable = [
    "src/__version__.py:__version__",
]
version_toml = [
    "pyproject.toml:project.version",
]
branch = "main"
upload_to_pypi = true
upload_to_release = true
build_command = "pip install uv && uv build"
commit_message = "chore(release): {version} [skip ci]"


[tool.responseiq]
# Configure what ResponseIQ scans/ignores.
# This prevents checking source code for false positives when running self-scans.
ignore_dirs = [
    ".git", ".venv", "venv", "env", "node_modules", "__pycache__",
    "dist", "build", "system", "site-packages",
    "tests", "test", "docs", "fixtures", "terraform", "helm"
]
ignore_extensions = [
    ".yml", ".yaml", ".json", ".md", ".toml", ".pyc", ".pyo", ".lock",
    ".whl", ".png", ".jpg", ".gif", ".css", ".map",
    # Source Code (ResponseIQ parses logs, not source code, unless specifically targeted)
    ".py", ".js", ".ts", ".go", ".java", ".c", ".cpp"
]
