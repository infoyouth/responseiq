[project]
name = "responseiq"
version = "0.1.0"
description = "AI-powered remediation copilot for incident response"
authors = [{ name = "Youth Innovations", email = "info.youthinno@gmail.com" }]
requires-python = "==3.12.*"

dependencies = [
    "fastapi",
    "uvicorn",
    "loguru",
    "pydantic",
    "httpx",
    "slack-sdk",
    "PyGithub",
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-instrumentation",
    "opentelemetry-instrumentation-fastapi",
    "opentelemetry-exporter-jaeger",
    "opentelemetry-instrumentation-logging",
    "psycopg2-binary",
    "sqlmodel",
]

[tool.uv]
dev-dependencies = [
    "pytest",
    "black",
    "ruff",
    "flake8",
    "isort",
    "bandit",
    "mypy",
    "types-requests",
    "pbr",
]

[tool.black]
line-length = 88

[tool.flake8]
max-line-length = 88

[tool.ruff]
line-length = 88